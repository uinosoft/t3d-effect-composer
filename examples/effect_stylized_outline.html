<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>t3d-effect-composer</title>
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
	<link type="text/css" rel="stylesheet" href="main.css" />
	<style>
		.top-left-corner {
			left: 15px;
		}
	</style>
</head>
<body>
	<div id="info">
		Stylized Outline Effect which uses 
		<a href="https://en.wikipedia.org/wiki/Jump_flooding_algorithm" target="_blank" rel="noopener">Jump Flood Algorithm</a>.<br/>
		Reference to: 
		<a href="https://github.com/gkjohnson/three-jumpflood-demo" target="_blank" rel="noopener">three-jumpflood-demo</a> 
		by gkjohnson
	</div>
</body>

<!-- Import maps polyfill -->
<!-- Remove this when import maps will be widely supported -->
<script async src="./node_modules/es-module-shims/dist/es-module-shims.js"></script>

<script type="importmap">
	{
		"imports": {
			"t3d": "./node_modules/t3d/build/t3d.module.js",
			"t3d/addons/": "./node_modules/t3d/examples/jsm/",
			"t3d-effect-composer": "../build/t3d.effectcomposer.module.js"
		}
	}
</script>

<script type="module">
	import * as t3d from 't3d';
	import { OrbitControls } from 't3d/addons/controls/OrbitControls.js';
	import { SkyBox } from 't3d/addons/objects/SkyBox.js';
	import { GLTFLoader } from 't3d/addons/loaders/glTF/GLTFLoader.js';
	import { RGBETexture2DLoader } from 't3d/addons/loaders/RGBELoader.js';
	import { PMREMGenerator } from 't3d/addons/textures/PMREMGenerator.js';
	import { DefaultEffectComposer } from 't3d-effect-composer';
	import { StylizedOutlineEffect } from './jsm/StylizedOutlineEffect.js';
	import { GUI } from './node_modules/lil-gui/dist/lil-gui.esm.js';
	import Stats from './node_modules/stats.js/src/Stats.js';

	let width = window.innerWidth || 2;
	let height = window.innerHeight || 2;

	const canvas = document.createElement('canvas');
	canvas.width = width;
	canvas.height = height;
	document.body.appendChild(canvas);

	const contextParams = { antialias: true, alpha: false, stencil: false };
	const gl = canvas.getContext('webgl2', contextParams);
	const renderer = new t3d.WebGLRenderer(gl);
	const screenRenderTarget = new t3d.ScreenRenderTarget(canvas);

	const options = {
		samplerNumber: Math.min(renderer.capabilities.maxSamples, 5),
		webgl2: renderer.capabilities.version > 1
	};
	const effectComposer = new DefaultEffectComposer(width, height, options);

	const stylizedOutlineEffect = new StylizedOutlineEffect();
	stylizedOutlineEffect.color.setRGB(0, 1, 0.5);
	effectComposer.addEffect('outline2', stylizedOutlineEffect, 99);

	const scene = new t3d.Scene();

	const camera = new t3d.Camera();
	camera.position.set(3, 1, 4);
	camera.lookAt(new t3d.Vector3(0, 0, 0), new t3d.Vector3(0, 1, 0));
	camera.setPerspective((30 / 180) * Math.PI, width / height, 1, 1000);
	scene.add(camera);

	const controller = new OrbitControls(camera, canvas);

	camera.gammaFactor = 2;
	camera.outputEncoding = t3d.TEXEL_ENCODING_TYPE.GAMMA;

	effectComposer.getBuffer('SceneBuffer').setOutputEncoding(t3d.TEXEL_ENCODING_TYPE.GAMMA);
	effectComposer.sceneMSAA = true;

	// Load Model

	new GLTFLoader().load('./resources/gltf/DamagedHelmet/glTF/DamagedHelmet.gltf').then(function(result) {
    	const object = result.root;
		object.traverse(function(child) {
			if (child.material) {
				child.effects = {};
				child.effects['outline2'] = 1;
			}
		});
    	scene.add(object);
	}).catch(e => console.error(e));

	// Load Skybox

	new RGBETexture2DLoader().load('./resources/sky_hdr/royal_esplanade_1k.hdr', function(texture) {
    	texture = (new PMREMGenerator(128)).prefilter(renderer, texture);

    	scene.background = texture;
    	scene.environment = texture;

    	const skyBox = new SkyBox(texture);
    	scene.add(skyBox);
	});

	// Stats

	const stats = new Stats();
	stats.dom.style.cssText =
		'position:fixed;bottom:0;left:0;cursor:pointer;opacity:0.9;z-index:10000';
	stats.showPanel(0);
	document.body.appendChild(stats.dom);

	// Gui
	const gui = new GUI();
	gui.add(stylizedOutlineEffect, 'mode', {
		'coordinate(debug)': 0,
		'sdf(debug)': 1,
		'outline': 2,
		'glow': 3,
		'pulse': 4,
		'halftone': 5,
		'rings': 6
	});
	gui.add(stylizedOutlineEffect, 'thickness', 1, 100);
	gui.add(stylizedOutlineEffect, 'inside');
	gui.addColor(stylizedOutlineEffect, 'color');

	function loop(count) {
		requestAnimationFrame(loop);

		stats.begin();

		controller.update();

		scene.updateMatrix();
		scene.updateRenderStates(camera);
		scene.updateRenderQueue(camera);

		effectComposer.render(renderer, scene, camera, screenRenderTarget);

		stats.end();
	}
	requestAnimationFrame(loop);

	function onWindowResize() {
		width = window.innerWidth || 2;
		height = window.innerHeight || 2;

		camera.setPerspective(45 / 180 * Math.PI, width / height, 1, 5000);

		screenRenderTarget.resize(width, height);
		effectComposer.resize(width, height);
	}
	window.addEventListener('resize', onWindowResize, false);
</script>
</html>
